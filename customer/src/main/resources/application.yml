server:
  port: 8081
cors:
  allowed-origins: '*'
  allowed-methods: '*'
spring:
  application:
    name: customer
  datasource:
    username: admin
    password: admin
    url: jdbc:postgresql://localhost:5432/postgres
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

clients:
  fraud:
    url: http://localhost:8085
  notification:
    url: http://localhost:8090

