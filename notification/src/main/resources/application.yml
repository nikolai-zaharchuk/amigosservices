server:
  port: 8090
spring:
  flyway:
    enabled: true
    schemas: customer
  datasource:
    username: admin
    password: admin
    url: jdbc:postgresql://localhost:5432/notification
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true