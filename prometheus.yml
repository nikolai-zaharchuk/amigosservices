global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "customer"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]

  - job_name: "fraud"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8085"]

  - job_name: "notification"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8090"]